<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expansão em POP - Transceiver</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gd:#8CBF3F;--gm:#8CBF3F;--gl:#f4f9ec;--red:#c0392b;--g50:#f7f8fa;--g100:#eef0f3;--g300:#d0d5dd;--g500:#6b7585;--g800:#2d3444;--bdr:#d4ddd8;--r:6px;--rl:10px;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#ecf0eb;color:var(--g800);font-size:14px;line-height:1.5;padding:24px 16px 90px}
.shell{max-width:880px;margin:0 auto;background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(26,92,55,.13);overflow:hidden}
.fhd{background:var(--gd);padding:24px 32px;display:flex;align-items:center;gap:20px}
.lz{flex-shrink:0;width:160px;height:68px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;overflow:hidden;background:#fff;padding:4px 8px}
.lz img{width:100%;height:100%;object-fit:contain}
.hi h1{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.hi p{font-size:12px;color:rgba(255,255,255,.6)}
.fb{padding:28px 32px 40px}
.progress-bar{display:flex;align-items:center;justify-content:center;padding:16px 32px;background:var(--g50);border-bottom:1px solid var(--bdr);gap:0;overflow-x:auto}
.step-wrap{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.step-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--g300);color:var(--g500);background:#fff;transition:all .3s;cursor:pointer}
.step-dot.active{border-color:var(--gd);background:var(--gd);color:#fff}
.step-dot.done{border-color:var(--gd);background:var(--gl);color:var(--gd)}
.step-line{width:20px;height:2px;background:var(--g300);margin-bottom:16px}.step-line.done{background:var(--gd)}
.step-label{font-size:8px;color:var(--g500);text-align:center;margin-top:3px;max-width:60px;line-height:1.2}.step-label.active{color:var(--gd);font-weight:700}
.sec{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gd);padding-bottom:7px;border-bottom:2px solid var(--gd);margin:0 0 14px}
.wizard-section{display:none}.wizard-section.active{display:block}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px}
.s2{grid-column:span 2}
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.5px}
.req{color:var(--red)}
input[type="text"],input[type="date"],select,textarea{width:100%;padding:8px 11px;border:1px solid var(--bdr);border-radius:var(--r);font-size:13.5px;font-family:inherit;color:var(--g800);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--gm);box-shadow:0 0 0 3px rgba(140,191,63,.15)}
textarea{resize:vertical;min-height:60px}
.combo{position:relative}
.combo-input-wrap{position:relative}
.combo-input-wrap input{width:100%;padding-right:34px}
.combo-caret{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:18px;height:18px;pointer-events:none;color:var(--g500);transition:transform .15s}
.combo.open .combo-caret{transform:translateY(-50%) rotate(180deg);color:var(--gd)}
.combo-list{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--bdr);border-radius:var(--r);box-shadow:0 6px 18px rgba(26,92,55,.15);max-height:260px;overflow-y:auto;z-index:50}
.combo.open .combo-list{display:block}
.combo-item{padding:10px 12px;font-size:13.5px;color:var(--g800);cursor:pointer;border-bottom:1px solid var(--g100);min-height:44px;display:flex;align-items:center;font-family:inherit;line-height:1.3}
.combo-item:last-child{border-bottom:none}
.combo-item:hover,.combo-item.active{background:var(--gl);color:var(--gd);font-weight:600}
.combo-item mark{background:transparent;color:var(--gd);font-weight:700;padding:0}
.combo-empty{padding:12px;font-size:12px;color:var(--g500);text-align:center;font-style:italic}
.equip-card{border:1px solid var(--bdr);border-radius:var(--rl);padding:16px;margin-bottom:16px;background:var(--g50)}
.equip-card .fld{margin-bottom:12px}
.photo-label-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px dashed var(--g300);border-radius:var(--r);background:#fff;font-size:12px;color:var(--g500);cursor:pointer;font-family:inherit;transition:all .15s;flex:1;justify-content:center;min-height:44px}
.photo-label-btn:hover,.photo-label-btn:active{border-color:var(--gm);color:var(--gd);background:var(--gl)}
.chk-photo{margin-top:6px}
.chk-photo .photo-btns{margin-bottom:4px}
.chk-photo-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.chk-photo-item{display:flex;align-items:center;gap:8px;border:1px solid var(--bdr);border-radius:var(--r);padding:6px;background:#fff}
.chk-photo-item img{width:80px;height:60px;object-fit:cover;border-radius:4px;border:1px solid var(--bdr)}
.chk-photo-item .ph-rm-btn{font-size:10px;padding:4px 8px}
.ph-rm-btn{background:#f5e8e8;color:var(--red);border:1px solid #e0c0c0;cursor:pointer;font-size:11px;font-weight:700;padding:6px 12px;border-radius:6px;font-family:inherit;align-self:flex-start}
.nav-buttons{display:flex;gap:10px;justify-content:space-between;margin-top:28px;padding-top:18px;border-top:1px solid var(--bdr)}
.btn{padding:9px 20px;border:none;border-radius:var(--r);cursor:pointer;font-weight:700;font-size:13px;font-family:inherit;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97)}.btn:hover{opacity:.85}
.btng{background:var(--g100);color:var(--g800)}.btnr{background:#f5e8e8;color:var(--red)}.btnp{background:var(--gm);color:#fff}.btn-lg{padding:12px 28px;font-size:14px}
.sov{display:none;position:fixed;inset:0;z-index:9999;background:rgba(255,255,255,.92);flex-direction:column;align-items:center;justify-content:center;gap:14px}.sov.on{display:flex}
.spin{width:44px;height:44px;border:4px solid #d4ddd8;border-top-color:var(--gm);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.sov p{font-size:14px;color:var(--g500);font-weight:600}
@media(max-width:768px){
  body{padding:10px 6px 100px}.shell{border-radius:10px}
  .fhd{padding:16px 14px;gap:12px;flex-wrap:wrap;justify-content:center;text-align:center}
  .lz{width:130px;height:56px;padding:3px 6px}.hi h1{font-size:16px}.fb{padding:16px 14px 30px}
  .g2{grid-template-columns:1fr;gap:10px}.s2{grid-column:span 1}
  input[type="text"],input[type="date"],select,textarea{font-size:16px!important;padding:10px 12px;-webkit-appearance:none}
  .btn-lg{width:100%;text-align:center;padding:14px;font-size:15px}
  .nav-buttons{flex-direction:column;gap:8px}
  .nav-buttons>div{display:flex;flex-direction:column;gap:8px;width:100%}
}
</style>
</head>

function toggleClienteEtiqueta(){
  const tipo=document.getElementById('f-tipo').value;
  const show=(tipo===''||tipo==='Cliente');
  const flC=document.getElementById('fld-cliente');
  const flE=document.getElementById('fld-etiqueta');
  flC.style.display=show?'flex':'none';
  flE.style.display=show?'flex':'none';
  if(!show){document.getElementById('f-cliente').value='';document.getElementById('f-etiqueta').value='';}
}

function showToast(msg,type='success'){

function compressImage(file,mx,q){return new Promise(res=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>mx||h>mx){const rt=Math.min(mx/w,mx/h);w=Math.round(w*rt);h=Math.round(h*rt);}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',q));};img.src=e.target.result;};r.readAsDataURL(file);});}

function dataURLtoBlob(dataURL){
  const arr=dataURL.split(',');
  const mime=arr[0].match(/:(.*?);/)[1];
  const bstr=atob(arr[1]);
  let n=bstr.length;
  const u8arr=new Uint8Array(n);
  while(n--){u8arr[n]=bstr.charCodeAt(n);}
  return new Blob([u8arr],{type:mime});
}

async function uploadGroupPhotos(group,prefixo){
  const photos=groupPhotos[group]||[];
  const urls=[];
  for(let i=0;i<photos.length;i++){
    const blob=dataURLtoBlob(photos[i].src);
    const fileName=`${prefixo}_${Date.now()}_${i}.jpg`;
    const{error}=await supabaseClient.storage.from(FOTOS_BUCKET).upload(fileName,blob,{contentType:'image/jpeg',upsert:true});
    if(error)throw error;
    const{data}=supabaseClient.storage.from(FOTOS_BUCKET).getPublicUrl(fileName);
    urls.push(data.publicUrl);
  }
  return urls;
}

function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function setupPopCombo(){
  const combo=document.getElementById('combo-pop');const input=document.getElementById('f-pop');const list=document.getElementById('combo-pop-list');let activeIdx=-1;let currentItems=[];
  function render(filter){const f=(filter||'').trim().toUpperCase();currentItems=f?POPS_LIST.filter(p=>p.toUpperCase().includes(f)):POPS_LIST.slice();if(!currentItems.length){list.innerHTML='<div class="combo-empty">Nenhum POP encontrado</div>';return;}list.innerHTML=currentItems.map((p,i)=>{let html=escapeHtml(p);if(f){const re=new RegExp('('+f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');html=escapeHtml(p).replace(re,'<mark>$1</mark>');}return `<div class="combo-item" role="option" data-idx="${i}" data-val="${escapeHtml(p)}">${html}</div>`;}).join('');activeIdx=-1;}
  function open(){combo.classList.add('open');render(input.value);}
  function close(){combo.classList.remove('open');activeIdx=-1;}
  function pick(val){input.value=val;currentCidade=getCidade(val);close();input.dispatchEvent(new Event('change'));}
  function setActive(idx){const items=list.querySelectorAll('.combo-item');items.forEach(el=>el.classList.remove('active'));if(idx>=0&&idx<items.length){items[idx].classList.add('active');items[idx].scrollIntoView({block:'nearest'});activeIdx=idx;}}
  input.addEventListener('focus',open);input.addEventListener('click',open);
  input.addEventListener('input',()=>{render(input.value);if(!combo.classList.contains('open'))combo.classList.add('open');});
  input.addEventListener('keydown',e=>{if(!combo.classList.contains('open')&&['ArrowDown','ArrowUp'].includes(e.key)){open();return;}if(e.key==='ArrowDown'){e.preventDefault();setActive(Math.min(activeIdx+1,currentItems.length-1));}else if(e.key==='ArrowUp'){e.preventDefault();setActive(Math.max(activeIdx-1,0));}else if(e.key==='Enter'){if(activeIdx>=0){e.preventDefault();pick(currentItems[activeIdx]);}}else if(e.key==='Escape'){close();}});
  list.addEventListener('mousedown',e=>{const it=e.target.closest('.combo-item');if(it){e.preventDefault();pick(it.dataset.val);}});
  document.addEventListener('mousedown',e=>{if(!combo.contains(e.target))close();});
}

  buildProgressBar();
